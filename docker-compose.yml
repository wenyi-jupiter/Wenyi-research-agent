version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agent_engine_db
    environment:
      POSTGRES_USER: agent_user
      POSTGRES_PASSWORD: agent_password
      POSTGRES_DB: agent_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_user -d agent_engine"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
